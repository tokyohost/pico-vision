name: 构建 Pico 升级包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 升级包版本
        required: false
        default: manual

permissions:
  contents: read

jobs:
  build:
    name: 构建 ${{ matrix.board_model }} / ${{ matrix.lcd_device_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board_model:
          - rp2040_usb
          - rp2040_typec
        lcd_device_type:
          - st7789-2inch-8pin-a
          - st7789-2.4inch-10pin-a
          - st7789-2.4inch-8pin-b
    steps:
      - name: 检出项目代码
        uses: actions/checkout@v6
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: 生成 Pico 升级包
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then version="${{ inputs.version }}"; fi
          mkdir -p release-assets
          package_name="OmniWatch-pico-upgrade-v${version}-${{ matrix.board_model }}-${{ matrix.lcd_device_type }}.zip"
          python tools/package_pico_upgrade.py \
            --source picoRP2040 \
            --output "release-assets/${package_name}" \
            --version "${version}" \
            --board-model "${{ matrix.board_model }}" \
            --lcd-device-type "${{ matrix.lcd_device_type }}"
          (cd release-assets && sha256sum --check "${package_name}.sha256")
      - name: 上传 Pico 升级包
        uses: actions/upload-artifact@v7
        with:
          name: OmniWatch-pico-upgrade-${{ matrix.board_model }}-${{ matrix.lcd_device_type }}
          path: release-assets/OmniWatch-pico-upgrade-*
          if-no-files-found: error

  release:
    name: 发布全部 Pico 升级包
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: 检出完整 Git 历史
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 下载全部 Pico 升级包
        uses: actions/download-artifact@v5
        with:
          pattern: OmniWatch-pico-upgrade-*
          path: release-assets
          merge-multiple: true
      - name: 生成默认组合兼容包
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          source="release-assets/OmniWatch-pico-upgrade-v${version}-rp2040_usb-st7789-2inch-8pin-a.zip"
          target="release-assets/OmniWatch-pico-upgrade-v${version}.zip"
          cp "${source}" "${target}"
          (cd release-assets && sha256sum "$(basename "${target}")" > "$(basename "${target}").sha256")
      - name: 发布 Pico 升级包
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"; fi
          gh release upload "${GITHUB_REF_NAME}" release-assets/OmniWatch-pico-upgrade-* --clobber
      - name: 同步 Pico 升级包到文档仓库
        env:
          GH_TOKEN: ${{ secrets.OMNIWATCH_DOC_TOKEN }}
          GH_REPO: tokyohost/omniwatch-doc
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [[ -n "${previous_tag}" ]]; then
            log_range="${previous_tag}..${GITHUB_REF_NAME}"
          else
            log_range="${GITHUB_REF_NAME}"
          fi
          {
            echo "## Git 提交日志"
            echo
            git log "${log_range}" --no-merges --pretty=format:'- %h %s (%an)'
            echo
          } > RELEASE_NOTES.md
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --target main --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          gh release upload "${GITHUB_REF_NAME}" release-assets/OmniWatch-pico-upgrade-* --clobber
