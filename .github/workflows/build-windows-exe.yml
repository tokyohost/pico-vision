name: 构建 Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pico-monitor-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 Windows ${{ matrix.bits }} 位 EXE
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86
            bits: 32
            asset_name: pico-monitor-windows-x86.exe
          - architecture: x64
            bits: 64
            asset_name: pico-monitor-windows-x64.exe

    defaults:
      run:
        working-directory: monitor

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v6

      - name: 安装对应架构 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          architecture: ${{ matrix.architecture }}
          cache: pip
          cache-dependency-path: |
            monitor/requirements.txt
            monitor/requirements-build.txt

      - name: 安装运行及打包依赖
        run: python -m pip install -r requirements.txt -r requirements-build.txt

      - name: 写入发布版本信息
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $content = "`"`"`"保存构建时写入的 Monitor 版本及 GitHub 仓库信息。`"`"`"`nMONITOR_VERSION = `"$version`"`nGITHUB_REPOSITORY = `"$env:GITHUB_REPOSITORY`"`n"
          [IO.File]::WriteAllText((Join-Path $PWD "build_info.py"), $content, [Text.UTF8Encoding]::new($false))

      - name: 执行单元测试
        run: python -m unittest discover -s tests -v

      - name: 构建并验证 EXE
        shell: pwsh
        run: |
          python -m PyInstaller --clean --noconfirm pico_monitor.spec
          Move-Item -LiteralPath "dist/pico-monitor.exe" -Destination "dist/${{ matrix.asset_name }}"
          & "dist/${{ matrix.asset_name }}" --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 上传 EXE 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: windows-exe-${{ matrix.bits }}bit
          path: monitor/dist/${{ matrix.asset_name }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: 发布 Windows EXE
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: 下载全部 Windows 程序
        uses: actions/download-artifact@v5
        with:
          pattern: windows-exe-*
          path: release-assets
          merge-multiple: true

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
          fi
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.exe --clobber
