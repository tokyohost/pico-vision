name: 构建 Linux DEB

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pico-monitor-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: 构建 ${{ matrix.arch }} DEB
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
          - armhf
          - i386
    defaults:
      run:
        working-directory: monitor

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v6

      - name: 安装 Debian 打包工具
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential debhelper

      - name: 设置发布版本
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "${version}" =~ ^[0-9]+([.][0-9]+){2}(-[0-9A-Za-z.+]+)?$ ]]; then
            echo "不支持的版本标签：${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          debian_version="${version//-/\~}"
          echo "Git 标签 ${GITHUB_REF_NAME} 对应 Debian 版本 ${debian_version}"
          sed -i "1s|([^)]*)|(${debian_version})|" debian/changelog
          printf '%s\n' '"""保存构建时写入的 Monitor 版本及 GitHub 仓库信息。"""' "MONITOR_VERSION = \"${version}\"" 'GITHUB_REPOSITORY = "tokyohost/omniwatch-doc"' > build_info.py

      - name: 构建并检查 DEB 软件包
        env:
          DEB_BUILD_OPTIONS: nocheck
        run: |
          chmod 0755 debian/rules bin/pico-monitor
          dpkg-buildpackage --build=binary --no-sign --host-arch=${{ matrix.arch }}
          mkdir -p release-assets
          cp ../pico-monitor_*_${{ matrix.arch }}.deb release-assets/
          dpkg-deb --info release-assets/*.deb
          dpkg-deb --contents release-assets/*.deb

      - name: 上传 DEB 构建产物
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb-${{ matrix.arch }}
          path: monitor/release-assets/*.deb
          if-no-files-found: error

  build-generic:
    name: 构建通用 Linux 安装包
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitor

    steps:
      - name: 检出项目代码
        uses: actions/checkout@v6

      - name: 生成通用安装压缩包
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          version="${version#v}"
          package_name="pico-monitor-${version}-linux"
          printf '%s\n' '"""保存构建时写入的 Monitor 版本及 GitHub 仓库信息。"""' "MONITOR_VERSION = \"${version}\"" 'GITHUB_REPOSITORY = "tokyohost/omniwatch-doc"' > build_info.py
          mkdir -p "release-assets/${package_name}/packaging" "release-assets/${package_name}/debian"
          cp pico_monitor.py pico_client.py pico_upgrade.py monitor_update.py build_info.py system_monitor.py qbittorrent_monitor.py history.py requirements.txt install-linux.sh "release-assets/${package_name}/"
          cp packaging/pico-monitor-generic packaging/pico-monitor-generic.service "release-assets/${package_name}/packaging/"
          cp debian/pico-monitor.conf "release-assets/${package_name}/debian/"
          chmod 0755 "release-assets/${package_name}/install-linux.sh" "release-assets/${package_name}/packaging/pico-monitor-generic"
          tar -C release-assets -czf "release-assets/${package_name}.tar.gz" "${package_name}"
          rm -rf "release-assets/${package_name}"

      - name: 上传通用 Linux 安装包
        uses: actions/upload-artifact@v7
        with:
          name: linux-generic
          path: monitor/release-assets/*.tar.gz
          if-no-files-found: error

  release:
    name: 发布 Linux DEB
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build
      - build-generic
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: 检出完整 Git 历史
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 下载全部 Linux 软件包
        uses: actions/download-artifact@v5
        with:
          pattern: linux-*
          path: release-assets
          merge-multiple: true

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
          fi
          if ! compgen -G "release-assets/*.deb" >/dev/null; then
            echo "未找到任何 DEB 发布产物。" >&2
            exit 1
          fi
          (cd release-assets && sha256sum ./*.deb > SHA256SUMS-linux-deb.txt)
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.deb release-assets/SHA256SUMS-linux-deb.txt --clobber
          if compgen -G "release-assets/*.tar.gz" >/dev/null; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/*.tar.gz --clobber
          else
            echo "未生成可选的通用 Linux tar.gz，跳过上传。"
          fi

      - name: 同步 Linux 制品到文档仓库
        env:
          GH_TOKEN: ${{ secrets.OMNIWATCH_DOC_TOKEN }}
          GH_REPO: tokyohost/omniwatch-doc
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [[ -n "${previous_tag}" ]]; then
            log_range="${previous_tag}..${GITHUB_REF_NAME}"
          else
            log_range="${GITHUB_REF_NAME}"
          fi
          {
            echo "## Git 提交日志"
            echo
            git log "${log_range}" --no-merges --pretty=format:'- %h %s (%an)'
            echo
          } > RELEASE_NOTES.md
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.deb release-assets/SHA256SUMS-linux-deb.txt --clobber
          if compgen -G "release-assets/*.tar.gz" >/dev/null; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/*.tar.gz --clobber
          fi
