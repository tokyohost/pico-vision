# 固定串口名称；留空时自动发现 Pico LCD。
PICO_MONITOR_PORT=""
# 用于检测网络延迟的域名或 IP 地址。
PICO_MONITOR_PING_TARGET="www.baidu.com"
# 系统指标采集和发送间隔，单位为秒。
PICO_MONITOR_INTERVAL="1.0"
# 设备断线后的重连间隔，单位为秒。
PICO_MONITOR_RECONNECT_INTERVAL="3.0"
# Pico 屏幕旋转角度，可填写 0 或 180。
PICO_MONITOR_SCREEN_ROTATION="0"
# 网络速率模式：MB 自动使用 B/KB/MB/GB，Mbps 自动使用 bps/Kbps/Mbps/Gbps。
PICO_MONITOR_NETWORK_UNIT="MB"
