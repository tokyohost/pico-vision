# Pico Monitor Linux 服务配置。
serial:
  # 固定串口名称；留空时自动发现 Pico LCD。
  port: ""
  # 串口探测 PING 的发送间隔，单位为秒。
  probe_interval: 3.0

network:
  # 用于检测网络延迟的域名或 IP 地址。
  ping_target: www.baidu.com
  # 网络速率模式：MB 自动使用 B/KB/MB/GB，Mbps 自动使用 bps/Kbps/Mbps/Gbps。
  unit: MB

monitor:
  # 系统指标采集和发送间隔，单位为秒。
  interval: 1.0
  # 设备断线后的重连间隔，单位为秒。
  reconnect_interval: 3.0
  # 开发模式；开启后，未发现 Pico 时停止重试并持续打印 JSON 协议行。
  dev: false

screen:
  # Pico 屏幕旋转角度，可填写 0 或 180。
  rotation: 0
  # LCD 背光亮度百分比，可填写 1 至 100。
  lcd_brightness: 100
  # Pico LCD 界面样式名称。
  lcd_style: fps_simple

collection_tasks:
  # 各系统采集任务频率，键为英文任务标识，值为采集间隔秒数。
  intervals:
    # 基础信息采集。
    basic_information: 1
    # CPU 与内存采集。
    cpu_memory: 1
    # 磁盘容量与健康采集。
    disk_capacity_health: 60
    # 磁盘温度采集。
    disk_temperature: 5
    # 磁盘读写速率采集。
    disk_rate: 1
    # 网络采集。
    network: 1
    # 功耗采集。
    power: 1
    # GPU 采集。
    gpu: 1
    # FPS 采集。
    fps: 1
    # 自定义数据插件采集；custom_data 后缀来自 plugin.json 中的 name。
    # custom_data.my_data: 5

qbittorrent:
  # 是否开启 qBittorrent 指标采集；开启后必须配置地址、账号和密码。
  enabled: false
  # qBittorrent Web UI 地址。
  address: ""
  # qBittorrent Web UI 登录账号。
  username: ""
  # qBittorrent Web UI 登录密码。
  password: ""
  # qBittorrent 指标采集间隔，单位为秒。
  interval: 2.0

disk_health_test:
  # 磁盘健康显示测试：指定从 1 开始的磁盘序号，0 表示关闭。
  index: 0
  # 磁盘健康显示测试等级，范围为 0 至 5。
  level: 3

upgrade:
  # 覆盖 Pico 升级包下载地址；留空时使用当前 Monitor 版本默认地址。
  url: ""
  # 可选的升级包 SHA-256 摘要。
  sha256: ""
