# 固定串口名称；留空时自动发现 Pico LCD。
PICO_MONITOR_PORT=""
# 用于检测网络延迟的域名或 IP 地址。
PICO_MONITOR_PING_TARGET="www.baidu.com"
# 系统指标采集和发送间隔，单位为秒。
PICO_MONITOR_INTERVAL="1.0"
# 设备断线后的重连间隔，单位为秒。
PICO_MONITOR_RECONNECT_INTERVAL="3.0"
# Pico 屏幕旋转角度，可填写 0 或 180。
PICO_MONITOR_SCREEN_ROTATION="0"
# LCD 背光亮度百分比，可填写 1 至 100。
PICO_MONITOR_LCD_BRIGHTNESS="100"
# 网络速率模式：MB 自动使用 B/KB/MB/GB，Mbps 自动使用 bps/Kbps/Mbps/Gbps。
PICO_MONITOR_NETWORK_UNIT="MB"
# 开发模式；设为 1 后，未发现 Pico 时停止重试并持续打印 JSON 协议行。
PICO_MONITOR_DEV="0"
# 是否开启 qBittorrent 指标采集；开启后必须配置地址、账号和密码。
PICO_MONITOR_QBITTORRENT_ENABLED="0"
# qBittorrent Web UI 地址。
PICO_MONITOR_QBITTORRENT_ADDRESS=""
# qBittorrent Web UI 登录账号。
PICO_MONITOR_QBITTORRENT_USERNAME=""
# qBittorrent Web UI 登录密码。
PICO_MONITOR_QBITTORRENT_PASSWORD=""
# qBittorrent 指标采集间隔，单位为秒。
PICO_MONITOR_QBITTORRENT_INTERVAL="2.0"
